apiVersion: kubeone.k8c.io/v1beta2
kind: KubeOneCluster

versions:
  kubernetes: "{{ .VERSION }}"

clusterNetwork:
  kubeProxy:
    skipInstallation: true
  cni:
    cilium:
      enableHubble: true
      kubeProxyReplacement: strict
      enableLocalRedirectPolicy: true

features:
  nodeLocalDNS:
    deploy: false

addons:
  enable: true
  addons:
  - name: default-storage-class
