name: govulncheck
on:
  pull_request:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
