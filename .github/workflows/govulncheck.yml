name: govulncheck
on:
  pull_request:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
